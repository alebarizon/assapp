# Docker Compose — PRODUÇÃO AssApp (DigitalOcean)
# Pull-only — imagens do Docker Hub (build no GitHub Actions)
# Porta host: 80

services:
  db:
    image: postgres:14-alpine
    container_name: assapp_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME:-alebarizon}/assapp-backend:${IMAGE_TAG:-latest}
    container_name: assapp_backend_prod
    restart: always
    command: >
      sh -c "
        mkdir -p /app/logs &&
        python manage.py wait_for_db &&
        python manage.py migrate_schemas --shared &&
        python manage.py migrate_schemas &&
        python manage.py collectstatic --noinput &&
        gunicorn --config gunicorn_config.py core.wsgi:application
      "
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      BASE_DOMAIN: ${BASE_DOMAIN:-assapp.local}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      GUNICORN_BIND: 0.0.0.0:8000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_FORWARDED_ALLOW_IPS: "*"
      SYSTEM_TENANT_SCHEMA: ${SYSTEM_TENANT_SCHEMA:-sistema}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - assapp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${DOCKER_USERNAME:-alebarizon}/assapp-frontend:${IMAGE_TAG:-latest}
    container_name: assapp_frontend_prod
    restart: always
    networks:
      - assapp_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: assapp_nginx_prod
    restart: always
    volumes:
      - ./nginx/nginx_assapp_prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - assapp_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    name: assapp_postgres_data_prod
  static_volume:
    name: assapp_static_files_prod
  media_volume:
    name: assapp_media_files_prod
  backend_logs:
    name: assapp_backend_logs_prod

networks:
  assapp_network:
    name: assapp_network_prod
